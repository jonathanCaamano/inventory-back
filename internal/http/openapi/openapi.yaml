openapi: 3.0.3
info:
  title: Inventory Back API
  version: 0.3.0
servers:
  - url: /api/v1

tags:
  - name: auth
  - name: me
  - name: groups
  - name: products
  - name: admin

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      tags: [auth]
      summary: Register user and join/create a group
      description: |
        Creates a non-admin user and assigns them to a group.
        Group selection is mandatory:
        - If group_id is provided and exists: user is added as reader.
        - If group_slug or group_name is provided:
          - If the group exists: user is added as reader.
          - If the group does not exist: it is created and the user is added as writer.
        If no group fields are provided: returns group_required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
        "404":
          description: Group not found
        "409":
          description: Username already taken

  /auth/groups:
    get:
      tags: [auth]
      summary: List available groups for registration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"

  /me:
    get:
      tags: [me]
      summary: Current user profile and visible groups
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          description: Missing/invalid token

  /groups:
    get:
      tags: [groups]
      summary: List groups available to the current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"

  /products:
    get:
      tags: [products]
      summary: Search products
      description: Non-admin users must provide group_id and only see that group's products.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: group_id
          schema: { type: string, format: uuid }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, example: active }
        - in: query
          name: paid
          schema: { type: string, enum: ["true","false"] }
        - in: query
          name: min_price
          schema: { type: number, format: double }
        - in: query
          name: max_price
          schema: { type: number, format: double }
        - in: query
          name: from_entry
          schema: { type: string, format: date-time }
        - in: query
          name: to_entry
          schema: { type: string, format: date-time }
        - in: query
          name: sort
          schema:
            type: string
            enum: [created_at_desc, created_at_asc, price_asc, price_desc, entry_date_asc, entry_date_desc]
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Search result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
        "403":
          description: Forbidden

    post:
      tags: [products]
      summary: Create product
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden

  /products/{id}:
    get:
      tags: [products]
      summary: Get product by id
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden
        "404":
          description: Not found

    put:
      tags: [products]
      summary: Update product by id
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden
        "404":
          description: Not found

    delete:
      tags: [products]
      summary: Delete product by id
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
        "404":
          description: Not found

  /products/{id}/images/presign:
    post:
      tags: [products]
      summary: Generate a presigned URL to upload an image to S3
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignImageRequest"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignImageResponse"
        "403":
          description: Forbidden

  /products/{id}/images:
    post:
      tags: [products]
      summary: Attach an already-uploaded image URL to a product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Image"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden

  /products/{id}/contact:
    put:
      tags: [products]
      summary: Upsert contact for a product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Contact"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Forbidden

  /admin/users:
    get:
      tags: [admin]
      summary: List users
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResult"

    post:
      tags: [admin]
      summary: Create user
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUser"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid

  /admin/groups:
    post:
      tags: [admin]
      summary: Create group
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateGroup"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /admin/groups/{id}/members:
    get:
      tags: [admin]
      summary: List members of a group
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/GroupMember"

    post:
      tags: [admin]
      summary: Add member to a group
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAddMember"
      responses:
        "204":
          description: No Content

    delete:
      tags: [admin]
      summary: Remove member from group (query param username)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: username
          required: true
          schema: { type: string }
      responses:
        "204":
          description: No Content

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }

    RegisterRequest:
      type: object
      required: [username, password]
      oneOf:
        - required: [group_id]
        - required: [group_slug]
        - required: [group_name]
      properties:
        username: { type: string, minLength: 3 }
        password: { type: string, minLength: 8 }
        group_id: { type: string, format: uuid, nullable: true }
        group_slug: { type: string, nullable: true }
        group_name: { type: string, nullable: true }

    RegisterResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }
        user:
          type: object
          properties:
            id: { type: string, format: uuid }
            username: { type: string }
            is_admin: { type: boolean }
        group:
          $ref: "#/components/schemas/Group"
        role: { type: string, enum: [reader, writer] }

    MeProfile:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        groups:
          type: array
          items:
            type: object
            properties:
              group:
                $ref: "#/components/schemas/Group"
              role:
                type: string
                enum: [reader, writer]

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        is_admin: { type: boolean }
        is_active: { type: boolean }

    UserListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }

    GroupMember:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string, enum: [reader, writer] }

    Contact:
      type: object
      required: [first_name, last_name, phone_number]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        phone_number: { type: string }

    Image:
      type: object
      required: [image_url]
      properties:
        image_url: { type: string }
        position: { type: integer, default: 0 }

    ProductCreate:
      type: object
      required: [group_id, name, price, status, entry_date, paid]
      properties:
        group_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        price: { type: number, format: double }
        paid: { type: boolean }
        status: { type: string, enum: [draft, active, archived] }
        entry_date: { type: string, format: date-time }
        exit_date: { type: string, format: date-time, nullable: true }
        observations: { type: string }
        contact:
          $ref: "#/components/schemas/Contact"
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"

    ProductUpdate:
      type: object
      required: [name, price, status, entry_date, paid]
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number, format: double }
        paid: { type: boolean }
        status: { type: string, enum: [draft, active, archived] }
        entry_date: { type: string, format: date-time }
        exit_date: { type: string, format: date-time, nullable: true }
        observations: { type: string }

    Product:
      allOf:
        - $ref: "#/components/schemas/ProductCreate"
        - type: object
          properties:
            id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    SearchResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    PresignImageRequest:
      type: object
      required: [filename, content_type]
      properties:
        filename: { type: string }
        content_type: { type: string }
        position: { type: integer, default: 0 }

    PresignImageResponse:
      type: object
      properties:
        upload_url: { type: string }
        object_url: { type: string }
        object_key: { type: string }

    AdminCreateUser:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
        is_admin: { type: boolean, default: false }

    AdminCreateGroup:
      type: object
      required: [slug, name]
      properties:
        slug: { type: string }
        name: { type: string }

    AdminAddMember:
      type: object
      required: [username, role]
      properties:
        username: { type: string }
        role: { type: string, enum: [reader, writer] }
