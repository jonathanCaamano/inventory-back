kind: Deployment
apiVersion: apps/v1
metadata:
  name: postgresql-argo-workflows
  namespace: taller-inventario
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
    prometheus.io/path: /metrics
    prometheus.io/scheme: http
  labels:
    app: postgresql-inventory
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgresql-inventory
  template:
    metadata:
      labels:
        app: postgresql-inventory
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: /metrics
        prometheus.io/scheme: http
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: postgresql-inventory
          resources:
            limits:
              cpu: "500m"
              memory: 500Mi
            requests:
              cpu: "500m"
              memory: 500Mi
          terminationMessagePath: /dev/termination-log
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: {{ .Values.secrets.postgreSQL }}
            - name: POSTGRES_DB
              value: "inventory"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          imagePullPolicy: Always
          volumeMounts:
            - name: volume-postgresql-inventory
              mountPath: /var/lib/postgresql/data
          terminationMessagePolicy: File
          image:  ghcr.io/jonathancaamano/postgres:17.5-alpine3.22
        - name: metrics
          resources:
            limits:
              cpu: "500m"
              memory: 500Mi
            requests:
              cpu: "500m"
              memory: 500Mi
          image: ghcr.io/jonathancaamano/postgres-exporter:v0.17.1
          imagePullPolicy: Always
          env:
            - name: DATA_SOURCE_URI
              value: 127.0.0.1:5432/inventory?sslmode=disable
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: postgresql-inventory-config
                  key: password
            - name: DATA_SOURCE_USER
              value: postgres
          ports:
            - name: http-metrics
              containerPort: 9187
      volumes:
        - name: volume-postgresql-inventory
          persistentVolumeClaim:
            claimName: storage-volume-postgresql-inventory
        - name: shared-log-data
          emptyDir: {}
      dnsPolicy: ClusterFirst