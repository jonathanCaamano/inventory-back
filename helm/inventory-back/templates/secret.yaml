apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inventory-back.fullname" . }}
  labels:
    {{- include "inventory-back.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  S3_ENDPOINT: {{ .Values.secrets.s3Endpoint | quote }}
  S3_BUCKET: {{ .Values.secrets.s3Bucket | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  S3_PUBLIC_BASE_URL: {{ .Values.secrets.s3PublicBaseUrl | quote }}
  BOOTSTRAP_ADMIN_USERNAME: {{ .Values.bootstrapAdmin.username | quote }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.bootstrapAdmin.password | quote }}
