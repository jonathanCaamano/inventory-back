replicaCount: 2

image:
  repository: registry.example.com/inventory-back
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  name: dev # dev|staging|prod

config:
  httpAddr: ":8080"
  s3ForcePathStyle: true
  s3Region: us-east-1

secrets:
  jwtSecret: ""
  databaseUrl: ""
  s3Endpoint: ""
  s3Bucket: ""
  s3AccessKey: ""
  s3SecretKey: ""
  s3PublicBaseUrl: ""

bootstrapAdmin:
  username: "admin"
  password: "admin"
